name: IMAX Sentinel

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Download Camoufox binary
        run: uv run python -m camoufox fetch

      - name: Write config.toml
        env:
          CONFIG_TOML: ${{ secrets.CONFIG_TOML }}
        run: python -c "import os; open('config.toml', 'w').write(os.environ['CONFIG_TOML'])"

      - name: Run IMAX Sentinel
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: uv run python -m imax_sentinel.main

      - name: Persist sentinel.db
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p data
          touch data/sentinel.db
          git add data/sentinel.db
          git diff --cached --quiet || (git commit -m "chore: update sentinel.db [skip ci]" && git pull --rebase origin main && git push)
